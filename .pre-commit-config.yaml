repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: check-merge-conflict

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic
          - sqlalchemy
          - fastapi
          - redis
          - celery
          - pydantic-settings
        args: [--strict, --ignore-missing-imports]
        files: ^src/
        types: [python]

  - repo: local
    hooks:
      - id: import-linter
        name: Import Linter (Clean Architecture)
        entry: import-linter
        language: system
        types: [python]
        pass_filenames: false
        always_run: true

      - id: pytest-unit
        name: Unit Tests
        entry: pytest
        language: system
        args: [tests/unit, -q, --tb=short]
        types: [python]
        pass_filenames: false
        always_run: true